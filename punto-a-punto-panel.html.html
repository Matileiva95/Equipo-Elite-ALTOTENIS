<!-- ============================================================
     PUNTO A PUNTO — Panel HTML para integrar en index.html
     Agregar dentro de la sección de estadísticas del jugador
     Requiere: Chart.js + punto-a-punto.js
     ============================================================ -->

<!-- Modal / Panel completo -->
<div id="puntoAPuntoPanel" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.5); z-index:9999; overflow-y:auto;">
  <div style="max-width:480px; margin:20px auto; background:white; border-radius:12px;
    padding:0; min-height:80vh;">

    <!-- Header -->
    <div style="padding:16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0; font-size:16px; color:#333;">Análisis punto a punto</h3>
      <button onclick="closePuntoAPunto()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#999;">✕</button>
    </div>

    <!-- Input section -->
    <div id="papInput" style="padding:16px;">
      <div style="margin-bottom:12px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">Formato</label>
        <div style="display:flex; gap:0; border:1px solid #ddd; border-radius:8px; overflow:hidden;">
          <button id="papBtnAuto" onclick="setPapFormat('auto')" class="pap-format-btn pap-format-active"
            style="flex:1; padding:8px; border:none; cursor:pointer; font-size:12px;">
            Auto-detectar
          </button>
          <button id="papBtnItf" onclick="setPapFormat('itf')" class="pap-format-btn"
            style="flex:1; padding:8px; border:none; cursor:pointer; font-size:12px; border-left:1px solid #ddd;">
            ITF
          </button>
          <button id="papBtnTm" onclick="setPapFormat('tennismath')" class="pap-format-btn"
            style="flex:1; padding:8px; border:none; cursor:pointer; font-size:12px; border-left:1px solid #ddd;">
            TenisMath
          </button>
        </div>
      </div>

      <div style="margin-bottom:12px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">Jugador (tu academia)</label>
        <input id="papPlayerName" type="text" placeholder="Ej: A. Vergara" style="
          width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:8px;
          font-size:13px; box-sizing:border-box;">
      </div>

      <div style="margin-bottom:12px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">Rival</label>
        <input id="papRivalName" type="text" placeholder="Ej: K. Collins" style="
          width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:8px;
          font-size:13px; box-sizing:border-box;">
      </div>

      <div style="margin-bottom:12px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">
          Pegar datos punto a punto
        </label>
        <textarea id="papRawText" rows="10" placeholder="Pega aquí el texto de ITF o TenisMath..." style="
          width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px;
          font-size:12px; font-family:monospace; resize:vertical; box-sizing:border-box;
          line-height:1.5;"></textarea>
      </div>

      <button onclick="processPuntoAPunto()" style="
        width:100%; background:#534AB7; color:white; border:none; border-radius:8px;
        padding:12px; font-size:14px; cursor:pointer; font-weight:500;">
        Procesar y generar gráfico
      </button>

      <div id="papError" style="display:none; margin-top:8px; padding:8px 12px;
        background:#FCEBEB; color:#A32D2D; border-radius:8px; font-size:12px;"></div>
    </div>

    <!-- Results section -->
    <div id="papResults" style="display:none; padding:16px;">

      <!-- Match header -->
      <div id="papMatchHeader" style="
        background:#f8f8f8; border-radius:10px; padding:14px 16px; margin-bottom:14px;">
      </div>

      <!-- Tabs -->
      <div style="display:flex; border-bottom:1px solid #eee; margin-bottom:14px;">
        <button onclick="setPapTab('momentum')" class="pap-tab pap-tab-active" id="papTabMom"
          style="flex:1; padding:8px; border:none; background:none; cursor:pointer;
          font-size:12px; color:#999; border-bottom:2px solid transparent;">
          Momentum
        </button>
        <button onclick="setPapTab('stats')" class="pap-tab" id="papTabStats"
          style="flex:1; padding:8px; border:none; background:none; cursor:pointer;
          font-size:12px; color:#999; border-bottom:2px solid transparent;">
          Estadísticas
        </button>
      </div>

      <!-- Momentum charts container -->
      <div id="papMomentum"></div>

      <!-- Stats container -->
      <div id="papStats" style="display:none;"></div>

      <!-- Legend -->
      <div style="background:#f8f8f8; border-radius:8px; padding:10px 12px; margin-top:12px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px 10px;">
          <div style="display:flex; align-items:center; gap:6px; font-size:10px; color:#666;">
            <div style="width:9px;height:9px;border-radius:50%;background:rgba(83,74,183,0.4);border:1px solid rgba(83,74,183,0.6);"></div>
            Punto jugador
          </div>
          <div style="display:flex; align-items:center; gap:6px; font-size:10px; color:#666;">
            <div style="width:9px;height:9px;border-radius:50%;background:rgba(15,110,86,0.35);border:1px solid rgba(15,110,86,0.55);"></div>
            Punto rival
          </div>
          <div style="display:flex; align-items:center; gap:6px; font-size:10px; color:#666;">
            <div style="width:11px;height:11px;border-radius:50%;background:#534AB7;border:2px solid #3C3489;"></div>
            Game ganado
          </div>
          <div style="display:flex; align-items:center; gap:6px; font-size:10px; color:#666;">
            <div style="width:11px;height:11px;border-radius:50%;background:#EF9F27;border:2px solid #BA7517;"></div>
            Break
          </div>
          <div style="display:flex; align-items:center; gap:6px; font-size:10px; color:#666;">
            <div style="width:13px;height:13px;border-radius:50%;background:#97C459;border:2.5px solid #3B6D11;"></div>
            Set / partido
          </div>
        </div>
        <div style="font-size:9px; color:#999; margin-top:8px; padding-top:7px; border-top:1px solid #eee;">
          Toca un punto para ver detalle con marcador del game
        </div>
      </div>

      <!-- Actions -->
      <div style="margin-top:14px; display:flex; gap:8px;">
        <button onclick="savePuntoAPunto()" style="
          flex:1; background:#534AB7; color:white; border:none; border-radius:8px;
          padding:10px; font-size:13px; cursor:pointer;">
          Guardar en perfil
        </button>
        <button onclick="showPapInput()" style="
          padding:10px 16px; background:none; border:1px solid #ddd; border-radius:8px;
          font-size:13px; cursor:pointer; color:#666;">
          Nuevo
        </button>
      </div>
    </div>

  </div>
</div>

<style>
  .pap-format-btn { background: white; color: #666; transition: all 0.2s; }
  .pap-format-active { background: #534AB7 !important; color: white !important; }
  .pap-tab-active { color: #534AB7 !important; border-bottom-color: #534AB7 !important; font-weight: 500; }
</style>

<script>
// ——— Panel control ———
let papSelectedFormat = 'auto';
let papCharts = [];
let papParsedData = null;

function openPuntoAPunto() {
  document.getElementById('puntoAPuntoPanel').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closePuntoAPunto() {
  document.getElementById('puntoAPuntoPanel').style.display = 'none';
  document.body.style.overflow = '';
  papCharts.forEach(c => c.destroy());
  papCharts = [];
}

function setPapFormat(fmt) {
  papSelectedFormat = fmt;
  document.querySelectorAll('.pap-format-btn').forEach(b => b.classList.remove('pap-format-active'));
  document.getElementById('papBtn' + (fmt === 'auto' ? 'Auto' : fmt === 'itf' ? 'Itf' : 'Tm')).classList.add('pap-format-active');
}

function setPapTab(tab) {
  document.getElementById('papMomentum').style.display = tab === 'momentum' ? 'block' : 'none';
  document.getElementById('papStats').style.display = tab === 'stats' ? 'block' : 'none';
  document.querySelectorAll('.pap-tab').forEach(t => t.classList.remove('pap-tab-active'));
  document.getElementById(tab === 'momentum' ? 'papTabMom' : 'papTabStats').classList.add('pap-tab-active');
}

function showPapInput() {
  document.getElementById('papInput').style.display = 'block';
  document.getElementById('papResults').style.display = 'none';
  papCharts.forEach(c => c.destroy());
  papCharts = [];
}

function processPuntoAPunto() {
  const raw = document.getElementById('papRawText').value.trim();
  const p1 = document.getElementById('papPlayerName').value.trim() || 'Jugador';
  const p2 = document.getElementById('papRivalName').value.trim() || 'Rival';
  const errDiv = document.getElementById('papError');

  if (!raw) {
    errDiv.textContent = 'Pega los datos del partido primero.';
    errDiv.style.display = 'block';
    return;
  }

  errDiv.style.display = 'none';

  // Detect format
  let format = papSelectedFormat;
  if (format === 'auto') {
    format = PuntoAPunto.detectFormat(raw);
    if (!format) {
      errDiv.textContent = 'No pude detectar el formato. Selecciona ITF o TenisMath manualmente.';
      errDiv.style.display = 'block';
      return;
    }
  }

  try {
    // Parse
    if (format === 'itf') {
      papParsedData = PuntoAPunto.parseITF(raw);
    } else {
      papParsedData = PuntoAPunto.parseTennisMath(raw);
    }

    // Build momentum data
    const setsData = PuntoAPunto.buildMomentumData(papParsedData);

    // Render
    renderPapResults(setsData, p1, p2, format);

  } catch (e) {
    errDiv.textContent = 'Error procesando datos: ' + e.message;
    errDiv.style.display = 'block';
    console.error(e);
  }
}

function renderPapResults(setsData, p1Name, p2Name, format) {
  // Hide input, show results
  document.getElementById('papInput').style.display = 'none';
  document.getElementById('papResults').style.display = 'block';

  // Destroy old charts
  papCharts.forEach(c => c.destroy());
  papCharts = [];

  // Build header
  const headerDiv = document.getElementById('papMatchHeader');
  const totalP1 = setsData.reduce((s, set) => s + set.points.filter(p => p.w === 1).length, 0);
  const totalP2 = setsData.reduce((s, set) => s + set.points.filter(p => p.w === 2).length, 0);

  headerDiv.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:13px;font-weight:500;color:#333;">${p1Name}</div>
        <div style="font-size:22px;font-weight:500;color:#534AB7;margin-top:2px;">${totalP1} pts</div></div>
      <div style="text-align:center;font-size:10px;color:#999;">vs<br>${format.toUpperCase()}</div>
      <div style="text-align:right;"><div style="font-size:13px;font-weight:500;color:#333;">${p2Name}</div>
        <div style="font-size:22px;font-weight:500;color:#0F6E56;margin-top:2px;">${totalP2} pts</div></div>
    </div>`;

  // Build momentum charts per set
  const momDiv = document.getElementById('papMomentum');
  momDiv.innerHTML = '';

  setsData.forEach((set, si) => {
    const canvasId = 'papChart' + si;
    momDiv.innerHTML += `
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:500;color:#999;margin-bottom:6px;">Set ${set.setNum}</div>
        <div style="position:relative;width:100%;height:200px;">
          <canvas id="${canvasId}" role="img" aria-label="Momentum set ${set.setNum}"></canvas>
        </div>
      </div>`;
  });

  // Render charts after DOM update
  requestAnimationFrame(() => {
    setsData.forEach((set, si) => {
      const chart = PuntoAPunto.renderMomentumChart('papChart' + si, set.points, p1Name, p2Name);
      papCharts.push(chart);
    });
  });

  // Build stats (basic for ITF, detailed for TennisMath)
  const statsDiv = document.getElementById('papStats');
  statsDiv.innerHTML = buildStatsHTML(setsData, p1Name, p2Name, format);
}

function buildStatsHTML(setsData, p1, p2, format) {
  const totalP1 = setsData.reduce((s, set) => s + set.points.filter(p => p.w === 1).length, 0);
  const totalP2 = setsData.reduce((s, set) => s + set.points.filter(p => p.w === 2).length, 0);

  const games1 = setsData.reduce((s, set) => s + set.points.filter(p => p.gameWon && p.w === 1).length, 0);
  const games2 = setsData.reduce((s, set) => s + set.points.filter(p => p.gameWon && p.w === 2).length, 0);

  const breaks1 = setsData.reduce((s, set) => s + set.points.filter(p => p.isBreak && p.w === 1).length, 0);
  const breaks2 = setsData.reduce((s, set) => s + set.points.filter(p => p.isBreak && p.w === 2).length, 0);

  const pct1 = Math.round((totalP1 / (totalP1 + totalP2)) * 100);

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${statCard('Puntos totales', totalP1, totalP2)}
      ${statCard('Games ganados', games1, games2)}
      ${statCard('Breaks', breaks1, breaks2)}
      ${statCard('Ratio puntos', pct1 + '%', (100 - pct1) + '%')}
    </div>`;

  // Per-set breakdown
  setsData.forEach(set => {
    const sp1 = set.points.filter(p => p.w === 1).length;
    const sp2 = set.points.filter(p => p.w === 2).length;
    html += `
      <div style="margin-top:8px;">
        ${statCard('Set ' + set.setNum + ' puntos', sp1, sp2)}
      </div>`;
  });

  return html;
}

function statCard(label, v1, v2) {
  const n1 = typeof v1 === 'number' ? v1 : parseInt(v1);
  const n2 = typeof v2 === 'number' ? v2 : parseInt(v2);
  const c1 = (!isNaN(n1) && !isNaN(n2) && n1 > n2) ? 'color:#534AB7;' : '';
  const c2 = (!isNaN(n1) && !isNaN(n2) && n2 > n1) ? 'color:#0F6E56;' : '';

  return `
    <div style="background:#f8f8f8;border-radius:8px;padding:9px 11px;">
      <div style="font-size:10px;color:#999;margin-bottom:3px;">${label}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:14px;font-weight:500;${c1}">${v1}</div>
        <div style="font-size:9px;color:#ccc;">vs</div>
        <div style="font-size:14px;font-weight:500;${c2}">${v2}</div>
      </div>
    </div>`;
}

function savePuntoAPunto() {
  // TODO: Integrar con saveMatchStats() existente
  // Guardar papParsedData en player.matches[] o player.match_analysis[]
  alert('Guardado pendiente de integración — conectar con saveMatchStats()');
}
</script>
